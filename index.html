<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Soham Das - getLife Gamification</title>
    <link rel="icon" type="image/png" href="static/DA_favicon.png" />
    <script src="p5.js"></script>
    <script src="p5.sound.min.js"></script>
    <script src="ml5.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
      :root{ --paper:#f8f5ef; --ink:#1f1f1f; }
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:EB Garamond, serif;background:var(--paper);color:var(--ink)}
      .titlebar{position:fixed;top:0;left:0;width:100%;height:74px;background:rgba(248,245,239,.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-bottom:1px solid #d9d3c8;display:flex;align-items:center}
      .titlebar-inner{width:100%;padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
      .titlebar-logos img{height:26px}
      main{display:flex;align-items:center;justify-content:center;padding:120px 0 60px}

      /* deck styles */
      .deck-wrapper{display:flex;align-items:center;justify-content:center;gap:20px;width:min(76vw,960px);height:min(60vh,660px);max-height:660px;position:relative}
      .deck{position:relative;flex:1;height:100%;max-width:780px}
      .card{position:absolute;inset:0;border-radius:24px;overflow:hidden;background:#fff;box-shadow:0 26px 65px rgba(0,0,0,0.12);opacity:0;transform:scale(0.94);transition:opacity .35s ease,transform .35s ease;pointer-events:none}
      .card.active{opacity:1;transform:scale(1);pointer-events:auto}
      .card img{width:100%;height:100%;object-fit:contain;display:block}

      .trainer-card-wrapper{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}
      .trainer-card-wrapper canvas{display:block;width:auto;height:84%}
      .trainer-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
      .trainer-overlay-inner{pointer-events:auto;max-width:84%;background:rgba(255,255,255,0.96);padding:18px 22px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.12);text-align:center}
      .trainer-overlay-text{margin:0 0 10px;color:#111;font-size:1rem}
      .trainer-allow-btn{all:unset;cursor:pointer;padding:6px 10px;border-radius:999px;background:#7b5b3b;color:#fff;font-weight:700;font-size:0.88rem}
      .trainer-overlay[aria-hidden="true"]{opacity:0;transform:translateY(6px);transition:opacity .18s ease,transform .18s ease}
      .trainer-overlay[aria-hidden="false"]{opacity:1;transform:none}

      .deck-control{all:unset;cursor:pointer;width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,0.95);border:1px solid rgba(0,0,0,0.08);box-shadow:0 12px 28px rgba(0,0,0,0.12);display:grid;place-items:center;font-size:1.4rem;font-weight:700;color:#111}
      .deck-last{position:absolute;bottom:18px;right:18px;z-index:2;width:auto;min-width:82px;padding:0 14px;height:42px;border-radius:999px;font-size:.95rem;font-weight:700}

      .page-footer{display:flex;justify-content:center;gap:14px;margin:24px auto 36px;max-width:760px;padding:0 20px}
      .site-link{all:unset;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:140px;height:46px;border-radius:999px;background:#7b5b3b;color:#fff;font-size:0.96rem;font-weight:700;text-decoration:none}

      @media(max-width:700px){main{padding-top:140px}.deck-wrapper{flex-direction:column;height:auto}}
    </style>
  <style>
      main{display:flex;align-items:center;justify-content:center;padding:120px 40px 60px}
      .split-layout{width:min(1200px,100%);display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
      .game-side,.tutorial-side{min-width:0;display:flex;align-items:center;justify-content:center}
      .game-side{height:560px}
      .trainer-card-wrapper{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
      .trainer-card-wrapper canvas{display:block!important;width:auto!important;height:512px!important;max-width:100%!important;max-height:100%!important;margin:0!important}
      .tutorial-side img{display:block;width:100%;height:auto;max-height:560px;object-fit:contain}
      @media(max-width:800px){.split-layout{grid-template-columns:1fr}.game-side{height:512px}}
    </style>

<style>
    :root{ --paper:#f8f5ef; --ink:#1f1f1f; --line:#d9d3c8; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:EB Garamond, serif;background:var(--paper);color:var(--ink);}
    /* Title bar (copied from thesis book) */
    .titlebar{position:fixed;top:0;left:0;width:100%;height:74px;background:rgba(248,245,239,.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-bottom:1px solid var(--line);z-index:100;display:flex;align-items:center}
    .titlebar-inner{width:100%;padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
    .titlebar-logos{display:flex;align-items:center;gap:18px}
    .titlebar-logos img{height:26px;width:auto;display:block}
    .titlebar-logos .da-logo{height:22px}
    .divider{width:1px;height:28px;background:var(--line);opacity:.6}
    .titlebar-title{text-align:center;font-size:.95rem;letter-spacing:.08em;white-space:nowrap;opacity:.85;font-weight:600}
    .titlebar-spacer{justify-self:end}
  </style>

</head>
  <body>
    
    <div class="titlebar">
    <div class="titlebar-inner">
      <div class="titlebar-logos">
        <img src="static/DAlogo_wordmark_transparent_black.png" alt="Domus Academy Milano" class="da-logo"/>
        <div class="divider"></div>
        <img src="static/Technogym_Logo_svg.webp" alt="Technogym"/>
      </div>
      <div class="titlebar-title">Master's Thesis Project · getLife Gamification Prototype</div>
      <div class="titlebar-spacer"></div>
    </div>
  </div>

    <main>
      <section class="split-layout">
        <div class="game-side">
          <div id="trainer-card-wrapper" class="trainer-card-wrapper">
            <div id="trainer-overlay" class="trainer-overlay" aria-hidden="false">
              <div class="trainer-overlay-inner">
                <p class="trainer-overlay-text">please, grant camera permission to experience the prototype.</p>
                <div class="trainer-overlay-actions"><button id="trainer-allow" class="trainer-allow-btn">Allow camera</button></div>
              </div>
            </div>
          </div>
        </div>
        <div class="tutorial-side">
          <img src="images/tutorial_flappy.png" alt="Tutorial">
        </div>
      </section>

    <footer class="page-footer">
      <a class="site-link" href="../getLifeThesis/" target="_blank" rel="noopener">thesis</a>
      <a class="site-link" href="../getLife/" target="_blank" rel="noopener">trainer</a>
    </footer>

    <script src="sketch.js"></script>
    <script>
    (function(){
      const trainerOverlay = document.getElementById('trainer-overlay');
      const trainerAllow = document.getElementById('trainer-allow');

      if (trainerAllow) {
        trainerAllow.addEventListener('click', ()=>{
          if (window.startTrainer) window.startTrainer();
          if (trainerOverlay) trainerOverlay.setAttribute('aria-hidden','true');
        });
      }
    })();
    </script>
  </body>
